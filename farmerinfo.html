<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farmer Information Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      color: green;
      text-align: center;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 500px;
      margin: 30px 0;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    textarea {
      resize: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <h1>SMART FARMING</h1>

  <div class="container">
    <h2>Predict Crops</h2>

    <form>
      <!-- Personal Information -->

      <!-- Farm Information -->
      <label>Farm Location</label>
      <input type="text" placeholder="Village / City / District" required>

      <label>Farm Size (in acres)</label>
      <input type="number" step="0.1" placeholder="Enter farm size" required>

      <label>Irrigation Type</label>
      <select required>
        <option value="">Select irrigation type</option>
        <option>Rainfed</option>
        <option>Canal</option>
        <option>Borewell</option>
        <option>Drip Irrigation</option>
        <option>Sprinkler</option>
      </select>

      <!-- Soil Information -->
      <label>Soil Type</label>
      <select required>
        <option value="">Select soil type</option>
        <option>Alluvial Soil</option>
        <option>Black Soil</option>
        <option>Red Soil</option>
        <option>Laterite Soil</option>
        <option>Sandy Soil</option>
        <option>Clay Soil</option>
        <option>Loamy Soil</option>
      </select>
      <label>Water Source</label>
      <select>
        <option value="">Select water source</option>
        <option>River</option>
        <option>Well</option>
        <option>Borewell</option>
        <option>Rainwater</option>
      </select>

      <button type="submit">Submit Crops Dtails</button>
    </form>

  </div>

</body>
</html>
