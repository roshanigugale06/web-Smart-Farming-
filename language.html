<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Language</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      color: green;
      text-align: center;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 400px;
      margin-top: 40px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <h1>SMART FARMING</h1>

  <div class="container">
    <h2>Select Language</h2>

    <form action="farmer-form.html">
      <label for="language">Choose Your Language</label>
      <select id="language" required>
        <option value="">Select Language</option>
        <option>English</option>
        <option>Hindi</option>
        <option>Telugu</option>
        <option>Tamil</option>
        <option>Kannada</option>
        <option>Malayalam</option>
        <option>Marathi</option>
      </select>

      <button type="submit">Continue</button>
    </form>
  </div>

</body>
</html>
